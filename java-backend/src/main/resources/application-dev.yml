spring:
  config:
    import: optional:classpath:application-local.yml
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/agent_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    hikari:
      max-lifetime: 1800000    # 30 分钟（必须小于 MySQL wait_timeout，默认 28800 秒=8 小时）
      idle-timeout: 600000     # 10 分钟
      connection-timeout: 30000 # 30 秒
      validation-timeout: 5000  # 5 秒
      minimum-idle: 5
      maximum-pool-size: 20
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20      # 最大连接数
          max-idle: 10        # 最大空闲连接
          min-idle: 5         # 最小空闲连接
          max-wait: -1ms      # 无限等待
          time-between-eviction-runs: 60000ms  # 60秒检测一次

# MyBatis-Plus SQL 日志输出（仅开发环境）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志配置（仅开发环境）
logging:
  level:
    com.caius.agent: debug

# JWT 配置
jwt:
  secret: ${JWT_SECRET:change-me-in-local-config}
  expiration: 43200000  # 12小时
  header: Authorization
  prefix: "Bearer "

# 认证安全配置
auth:
  rate-limit:
    register-per-hour: 5
    register-per-day: 20

# Python Agent 服务配置
python-agent:
  url: ${PYTHON_AGENT_URL:http://localhost:5001}
  chat-endpoint: /api/chat
  stream-endpoint: /api/v1/chat/stream
  timeout: 30000  # 30秒
  stream-timeout: 120000  # 流式请求 120 秒
  heartbeat-interval: 15000  # 心跳间隔 15 秒
  retry:
    max-attempts: 3
    delay: 1000   # 1秒

# 流式服务配置
streaming:
  max-concurrent: 1000          # 最大并发流（全局）
  per-user-limit: 5             # 单用户最大流数
  max-chunks-per-message: 5000  # 单条消息最大 chunk 数
  chunk-ttl: 3600               # chunk TTL（秒）
