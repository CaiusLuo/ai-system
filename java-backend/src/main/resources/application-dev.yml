spring:
  datasource:
    url: jdbc:mysql://localhost:3306/agent_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# MyBatis-Plus SQL 日志输出（仅开发环境）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志配置（仅开发环境）
logging:
  level:
    com.caius.agent: debug

# JWT 配置
jwt:
  secret: mySecretKeyForJwtTokenGeneration2024AgentBackendSystem
  expiration: 86400000  # 24小时
  header: Authorization
  prefix: "Bearer "

# Python Agent 服务配置
python-agent:
  url: http://localhost:5000
  chat-endpoint: /api/chat
  timeout: 30000  # 30秒
  retry:
    max-attempts: 3
    delay: 1000   # 1秒
