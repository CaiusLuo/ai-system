spring:
  datasource:
    url: jdbc:mysql://localhost:3306/agent_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20      # 最大连接数
          max-idle: 10        # 最大空闲连接
          min-idle: 5         # 最小空闲连接
          max-wait: -1ms      # 无限等待
          time-between-eviction-runs: 60000ms  # 60秒检测一次

# MyBatis-Plus SQL 日志输出（仅开发环境）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志配置（仅开发环境）
logging:
  level:
    com.caius.agent: debug

# JWT 配置
jwt:
  secret: mySecretKeyForJwtTokenGeneration2024AgentBackendSystem
  expiration: 86400000  # 24小时
  header: Authorization
  prefix: "Bearer "

# Python Agent 服务配置
python-agent:
  url: http://localhost:5001
  chat-endpoint: /api/chat
  stream-endpoint: /api/v1/chat/stream
  timeout: 30000  # 30秒
  stream-timeout: 120000  # 流式请求 120 秒
  heartbeat-interval: 15000  # 心跳间隔 15 秒
  retry:
    max-attempts: 3
    delay: 1000   # 1秒

# 流式服务配置
streaming:
  max-concurrent: 1000          # 最大并发流（全局）
  per-user-limit: 5             # 单用户最大流数
  max-chunks-per-message: 5000  # 单条消息最大 chunk 数
  chunk-ttl: 3600               # chunk TTL（秒）
