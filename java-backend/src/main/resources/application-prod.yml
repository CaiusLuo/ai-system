spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:agent_db}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: 0
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 16
          min-idle: 4

# JWT 配置
jwt:
  secret: ${JWT_SECRET:mySecretKeyForJwtTokenGeneration2024AgentBackendSystem}
  expiration: 43200000  # 12小时
  header: Authorization
  prefix: "Bearer "

# 认证安全配置
auth:
  rate-limit:
    register-per-hour: 3
    register-per-day: 10

# Python Agent 服务配置
python-agent:
  url: ${PYTHON_AGENT_URL:http://localhost:5000}
  chat-endpoint: /api/chat
  timeout: 30000  # 30秒
  retry:
    max-attempts: 3
    delay: 1000   # 1秒

# 日志配置（生产环境仅 WARN）
logging:
  level:
    com.caius.agent: warn
    org.springframework.security: warn
